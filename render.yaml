services:
  - type: web
    name: crop-recommendation
    runtime: python
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir app flask_app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crop-db
          property: connectionString
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GEMINI_API_KEY
        value: AIzaSyBLCq-JAjb56qpZa3PI98qAlCMQ8OuS93Q
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
    plan: free

databases:
  - name: crop-db
    plan: free
    databaseName: cropdb
    user: cropuser
